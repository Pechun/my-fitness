<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="我的訓練">
<meta name="theme-color" content="#0d0d14">
<title>我的訓練</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;user-select:none}
:root{
  --bg:#0d0d14;--s1:#161622;--s2:#1e1e2e;--bd:#2d2d42;
  --acc:#8b7ff7;--acc2:#f0956a;--grn:#4de8a0;
  --txt:#ddddf0;--mut:#5a5a78;
  --safe-top:env(safe-area-inset-top);
  --safe-bot:env(safe-area-inset-bottom);
}
html,body{
  height:100%;background:var(--bg);color:var(--txt);
  font-family:system-ui,-apple-system,'Noto Sans TC',sans-serif;
  overflow:hidden;
}
#app{display:flex;flex-direction:column;height:100vh;height:100dvh;}
#screen{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;}
#nav{
  display:flex;background:var(--s1);border-top:1px solid var(--bd);
  padding-bottom:var(--safe-bot);flex-shrink:0;
}
.nav-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
  background:none;border:none;cursor:pointer;color:var(--mut);
  font-size:10px;font-family:inherit;padding:10px 0;transition:color .15s;
}
.nav-btn.on{color:var(--acc);}
.nav-icon{font-size:22px;line-height:1;}
.page{display:none;padding-bottom:20px;}
.page.show{display:block;}
.topbar{
  background:var(--s1);border-bottom:1px solid var(--bd);
  padding:calc(var(--safe-top) + 14px) 16px 14px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:10;
}
.topbar-title{font-size:17px;font-weight:700;}
.topbar-sub{font-size:11px;color:var(--mut);margin-top:2px;}
.card{background:var(--s1);border:1px solid var(--bd);border-radius:14px;margin:10px 14px 0;overflow:hidden;}
.card-head{padding:13px 16px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:10px;}
.card-head-icon{font-size:18px;}
.card-head-title{font-size:14px;font-weight:700;}
.badge{margin-left:auto;font-size:11px;padding:3px 10px;border-radius:100px;}
.badge-done{background:rgba(77,232,160,.15);color:var(--grn);}
.banner{
  margin:12px 14px 0;
  background:linear-gradient(135deg,rgba(139,127,247,.2),rgba(240,149,106,.15));
  border:1px solid rgba(139,127,247,.25);border-radius:14px;
  padding:16px;display:flex;align-items:center;justify-content:space-between;
}
.banner-title{font-size:19px;font-weight:700;}
.banner-sub{font-size:12px;color:var(--mut);margin-top:4px;}
.banner-note{font-size:11px;color:var(--acc);margin-top:6px;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.ring-wrap{position:relative;width:56px;height:56px;flex-shrink:0;}
.ring-wrap svg{transform:rotate(-90deg);}
.ring-center{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;}
.ex-row{
  display:flex;align-items:center;gap:12px;
  padding:14px 16px;border-bottom:1px solid var(--bd);
  cursor:pointer;transition:opacity .2s;
}
.ex-row:last-child{border-bottom:none;}
.ex-row.done{opacity:.55;}
.ex-check{
  width:26px;height:26px;border-radius:50%;border:2px solid var(--bd);
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:all .2s;
}
.ex-check.checked{background:var(--grn);border-color:var(--grn);}
.check-mark{font-size:13px;color:#0d0d14;font-weight:700;display:none;}
.ex-check.checked .check-mark{display:block;}
.ex-name{font-size:14px;font-weight:600;transition:all .2s;}
.ex-row.done .ex-name{text-decoration:line-through;color:var(--mut);}
.ex-detail{font-size:12px;color:var(--mut);margin-top:2px;}
.ex-actual{font-size:11px;color:var(--grn);display:none;}
.ex-weight{font-size:13px;color:var(--acc);font-weight:700;flex-shrink:0;}
.log-row{padding:12px 16px;border-bottom:1px solid var(--bd);}
.log-row:last-child{border-bottom:none;}
.log-label{font-size:12px;font-weight:600;color:var(--mut);margin-bottom:8px;}
.log-inputs{display:flex;gap:8px;}
.log-input{
  background:var(--s2);border:1.5px solid var(--bd);border-radius:9px;
  color:var(--txt);padding:10px;font-size:14px;font-family:inherit;outline:none;
  transition:border-color .2s;
}
.log-input:focus{border-color:var(--acc);}
.log-input.filled{border-color:var(--acc);}
.rest-card{padding:28px;text-align:center;color:var(--mut);}
.rest-emoji{font-size:36px;margin-bottom:8px;}
.rest-text{font-size:15px;font-weight:600;margin-bottom:4px;}
.rest-sub{font-size:13px;}
/* Schedule tabs */
.tab-row{display:flex;gap:8px;overflow-x:auto;padding:12px 14px;scrollbar-width:none;}
.tab-row::-webkit-scrollbar{display:none;}
.tab-btn{
  flex-shrink:0;padding:8px 16px;border-radius:100px;
  border:1.5px solid var(--bd);background:var(--s2);
  color:var(--mut);font-size:13px;cursor:pointer;
  font-family:inherit;font-weight:500;white-space:nowrap;transition:all .15s;
}
.tab-btn.on{background:var(--acc);border-color:var(--acc);color:#fff;font-weight:700;}
.sched-title{padding:12px 16px;border-bottom:1px solid var(--bd);font-size:14px;font-weight:700;color:var(--acc);}
/* Stats */
.stat-row{display:flex;gap:10px;padding:12px 14px 0;}
.stat-box{flex:1;background:var(--s1);border:1px solid var(--bd);border-radius:12px;padding:14px 10px;text-align:center;}
.stat-num{font-size:24px;font-weight:700;color:var(--acc);}
.stat-lbl{font-size:11px;color:var(--mut);margin-top:4px;}
.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;padding:14px;}
.week-day{display:flex;flex-direction:column;align-items:center;gap:5px;}
.wd-lbl{font-size:10px;color:var(--mut);}
.wd-dot{
  width:32px;height:32px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:600;border:1.5px solid var(--bd);
  background:var(--s2);color:var(--mut);
}
.wd-dot.today{border-color:var(--acc);color:var(--acc);background:rgba(139,127,247,.15);}
.wd-dot.done{background:var(--grn);border-color:var(--grn);color:#0d0d14;}
.sec-lbl{font-size:11px;color:var(--mut);letter-spacing:.06em;padding:14px 16px 4px;}
.hist-row{padding:13px 16px;display:flex;justify-content:space-between;align-items:center;}
.hist-note{padding:10px 16px;font-size:13px;color:var(--mut);line-height:1.6;border-top:1px solid var(--bd);}
/* Info */
.info-card{background:var(--s1);border:1px solid var(--bd);border-radius:12px;padding:16px;margin:0 14px 10px;display:flex;gap:14px;align-items:flex-start;}
.info-icon{font-size:24px;flex-shrink:0;}
.info-title{font-size:14px;font-weight:700;margin-bottom:4px;}
.info-desc{font-size:13px;color:var(--mut);line-height:1.65;}
/* Note modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:50;display:none;align-items:flex-end;justify-content:center;}
.overlay.show{display:flex;}
.modal{
  width:100%;max-width:480px;background:var(--s1);
  border-radius:20px 20px 0 0;
  padding:20px 18px calc(28px + var(--safe-bot));
}
.modal-handle{width:36px;height:4px;background:var(--bd);border-radius:100px;margin:0 auto 18px;}
.modal-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.modal-title{font-size:16px;font-weight:700;}
.modal-close{background:none;border:none;color:var(--mut);font-size:24px;cursor:pointer;padding:0;line-height:1;}
.note-ta{
  width:100%;background:var(--s2);border:1.5px solid var(--bd);border-radius:10px;
  color:var(--txt);padding:12px;font-size:15px;font-family:inherit;
  resize:none;min-height:100px;outline:none;line-height:1.6;
}
.note-ta:focus{border-color:var(--acc);}
.save-btn{
  width:100%;padding:15px;border-radius:12px;border:none;
  background:var(--acc);color:#fff;font-size:15px;font-weight:700;
  cursor:pointer;font-family:inherit;margin-top:12px;
}
.guide-section{margin-bottom:16px;}
.guide-section-title{font-size:12px;font-weight:700;color:var(--acc);letter-spacing:.06em;margin-bottom:10px;text-transform:uppercase;}
.guide-step{display:flex;gap:10px;margin-bottom:8px;align-items:flex-start;}
.guide-step-num{width:22px;height:22px;border-radius:50%;background:var(--acc);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
.guide-step-text{font-size:13px;line-height:1.6;color:var(--txt);}
.guide-tip{display:flex;gap:8px;margin-bottom:7px;align-items:flex-start;}
.guide-tip-icon{font-size:14px;flex-shrink:0;}
.guide-tip-text{font-size:13px;line-height:1.6;color:var(--mut);}
.info-btn{background:none;border:none;color:var(--mut);font-size:16px;cursor:pointer;padding:2px 4px;flex-shrink:0;}
</style>
</head>
<body>
<div id="app">
  <div id="screen">
    <div class="page show" id="pg-today"></div>
    <div class="page" id="pg-schedule"></div>
    <div class="page" id="pg-stats"></div>
    <div class="page" id="pg-info"></div>
  </div>
  <nav id="nav">
    <button class="nav-btn on" id="nb-today" onclick="showTab('today')"><div class="nav-icon">🏠</div>今天</button>
    <button class="nav-btn" id="nb-schedule" onclick="showTab('schedule')"><div class="nav-icon">📋</div>課表</button>
    <button class="nav-btn" id="nb-stats" onclick="showTab('stats')"><div class="nav-icon">📊</div>紀錄</button>
    <button class="nav-btn" id="nb-info" onclick="showTab('info')"><div class="nav-icon">ℹ️</div>說明</button>
  </nav>
</div>

<div class="overlay" id="guide-overlay" onclick="if(event.target===this)closeGuide()">
  <div class="modal" id="guide-modal">
    <div class="modal-handle"></div>
    <div class="modal-top">
      <div class="modal-title" id="guide-title"></div>
      <button class="modal-close" onclick="closeGuide()">×</button>
    </div>
    <div id="guide-body"></div>
  </div>
</div>
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-top">
      <div class="modal-title">📝 今日備註</div>
      <button class="modal-close" onclick="closeNote()">×</button>
    </div>
    <textarea class="note-ta" id="note-ta" placeholder="訓練感受、下次要調整的地方..."></textarea>
    <button class="save-btn" onclick="saveNote()">儲存</button>
  </div>
</div>

// ── State ──
let logs = {};
let currentTab = "today";
let schedIdx = 0;

function load(){
  try{ const d=JSON.parse(localStorage.getItem(DB)||"null"); if(d) logs=d.logs||{}; }catch(e){}
}
function persist(){
  try{ localStorage.setItem(DB, JSON.stringify({logs})); }catch(e){}
}
function todayStr(){ return new Date().toISOString().slice(0,10); }
function getLog(){ return logs[todayStr()]||(logs[todayStr()]={exercises:{},dayNote:""}); }
function todayIdx(){
  return [6,0,1,2,3,4,5][new Date().getDay()] % SCHEDULE.length;
}

// ── Navigation ──
function showTab(t){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('show'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('on'));
  document.getElementById('pg-'+t).classList.add('show');
  document.getElementById('nb-'+t).classList.add('on');
  currentTab = t;
  if(t==='today') renderToday();
  if(t==='schedule') renderSchedule();
  if(t==='stats') renderStats();
  if(t==='info') renderInfo();
  document.getElementById('screen').scrollTop=0;
}

// ── Ring SVG ──
function ringHTML(pct){
  const r=22, circ=2*Math.PI*r;
  const col = pct===100 ? 'var(--grn)' : 'var(--acc)';
  const dash = `${pct/100*circ} ${circ}`;
  return `<div class="ring-wrap">
    <svg width="56" height="56" viewBox="0 0 56 56">
      <circle cx="28" cy="28" r="${r}" fill="none" stroke="var(--bd)" stroke-width="5"/>
      <circle cx="28" cy="28" r="${r}" fill="none" stroke="${col}" stroke-width="5"
        stroke-linecap="round" stroke-dasharray="${dash}"/>
    </svg>
    <div class="ring-center" style="color:${col}">${pct}%</div>
  </div>`;
}

// ── TODAY ──
function renderToday(){
  try{
  const now = new Date();
  const h = now.getHours();
  const greet = h<12?"早安 ☀️":h<17?"午安 🌤️":"晚上好 🌙";
  const dateStr = `${now.getMonth()+1}月${now.getDate()}日（週${["日","一","二","三","四","五","六"][now.getDay()]}）`;
  const idx = todayIdx();
  const day = SCHEDULE[idx];
  const log = getLog();
  const exs = day.exercises;
  const doneCount = exs.filter((_,i)=>log.exercises[i]?.done).length;
  const pct = exs.length>0 ? Math.round(doneCount/exs.length*100) : 100;

  let html = `
  <div class="topbar">
    <div><div class="topbar-sub">${greet}</div><div class="topbar-title">${dateStr}</div></div>
    <button onclick="openNote()" style="background:none;border:none;color:var(--mut);font-size:22px;cursor:pointer">📝</button>
  </div>
  <div class="banner">
    <div>
      <div class="banner-title">${day.title}</div>
      <div class="banner-sub">${doneCount}/${exs.length} 個動作完成</div>
      ${log.dayNote?`<div class="banner-note">📝 ${log.dayNote}</div>`:''}
    </div>
    ${ringHTML(pct)}
  </div>`;

  if(exs.length===0){
    html += `<div class="card"><div class="rest-card">
      <div class="rest-emoji">🧘</div>
      <div class="rest-text">今天是休息日</div>
      <div class="rest-sub" style="color:var(--mut)">好好恢復，明天繼續！</div>
    </div></div>`;
  } else {
    // Checklist
    html += `<div class="card"><div class="card-head">
      <span class="card-head-icon">✅</span>
      <span class="card-head-title">今日動作</span>
      ${pct===100?`<span class="badge badge-done">全部完成 🎉</span>`:''}
    </div>`;
    exs.forEach((ex,i)=>{
      const done = log.exercises[i]?.done;
      const actual = log.exercises[i];
      html += `<div class="ex-row${done?' done':''}">
        <div class="ex-check${done?' checked':''}" onclick="toggleEx(${i})"><span class="check-mark">✓</span></div>
        <div style="flex:1" onclick="toggleEx(${i})">
          <div class="ex-name">${ex.name}</div>
          <div class="ex-detail">${ex.sets}組 × ${ex.reps}
            ${actual?.actualSets?`<span style="color:var(--grn)"> · 實際 ${actual.actualSets}組 ${actual.actualWeight||''}kg</span>`:''}
          </div>
        </div>
        <button class="info-btn" onclick="openGuide('${ex.name.replace(/'/g,"\\'")}')">📖</button>
        <div class="ex-weight" onclick="toggleEx(${i})">${ex.weight}</div>
      </div>`;
    });
    html += `</div>`;

    // Log
    html += `<div class="card"><div class="card-head">
      <span class="card-head-icon">📊</span>
      <span class="card-head-title">即時紀錄</span>
    </div>`;
    exs.forEach((ex,i)=>{
      const lg = log.exercises[i]||{};
      html += `<div class="log-row">
        <div class="log-label">${ex.name} <span style="color:var(--acc)">${ex.weight}</span></div>
        <div class="log-inputs">
          <input class="log-input${lg.actualSets?' filled':''}" style="flex:1" type="number" inputmode="numeric"
            placeholder="實際組數" value="${lg.actualSets||''}"
            oninput="logField(${i},'actualSets',this.value);this.classList.toggle('filled',!!this.value)">
          <input class="log-input${lg.actualWeight?' filled':''}" style="flex:1.5" type="number" inputmode="decimal"
            placeholder="重量 kg" value="${lg.actualWeight||''}"
            oninput="logField(${i},'actualWeight',this.value);this.classList.toggle('filled',!!this.value)">
        </div>
      </div>`;
    });
    html += `</div>`;
  }

    // Cooldown section
    if(day.cooldown && day.cooldown.length>0){
      html += `<div class="card">
        <div class="card-head">
          <span class="card-head-icon">🧘</span>
          <span class="card-head-title">收操放鬆</span>
          <span style="margin-left:auto;font-size:11px;color:var(--mut)">約 10 分鐘</span>
        </div>`;
      day.cooldown.forEach((c,i)=>{
        html += `<div style="display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:${i<day.cooldown.length-1?'1px solid var(--bd)':'none'}">
          <span style="font-size:18px;flex-shrink:0">🔵</span>
          <div style="flex:1">
            <div style="font-size:14px;font-weight:600;color:var(--txt)">${c.name}</div>
            <div style="font-size:12px;color:var(--mut);margin-top:2px">${c.note}</div>
          </div>
          <div style="font-size:12px;color:var(--acc2);font-weight:600;flex-shrink:0;text-align:right">${c.duration}</div>
        </div>`;
      });
      html += `</div>`;
    }

  html += `<div style="height:20px"></div>`;
  document.getElementById('pg-today').innerHTML = html;
  }catch(e){
    document.getElementById('pg-today').innerHTML = `
    <div class="topbar"><div class="topbar-title">今天</div></div>
    <div style="padding:24px;text-align:center;color:var(--mut);font-size:13px">載入時發生錯誤，請重新整理頁面</div>`;
  }
}

function toggleEx(i){
  const log = getLog();
  if(!log.exercises[i]) log.exercises[i]={};
  log.exercises[i].done = !log.exercises[i].done;
  persist(); renderToday();
}
function logField(i,field,val){
  const log = getLog();
  if(!log.exercises[i]) log.exercises[i]={};
  log.exercises[i][field] = val;
  persist();
}

// ── GUIDE ──
function openGuide(name){
  const g = EXERCISE_GUIDE[name];
  document.getElementById('guide-title').textContent = name;
  if(!g){
    document.getElementById('guide-body').innerHTML = `<div style="color:var(--mut);font-size:13px;padding:8px 0">暫無教學資料</div>`;
  } else {
    const steps = g.steps.map((s,i)=>`<div class="guide-step"><div class="guide-step-num">${i+1}</div><div class="guide-step-text">${s}</div></div>`).join('');
    const tips = g.tips.map(t=>`<div class="guide-tip"><div class="guide-tip-icon">💡</div><div class="guide-tip-text">${t}</div></div>`).join('');
    document.getElementById('guide-body').innerHTML = `
      <div class="guide-section">
        <div class="guide-section-title">動作步驟</div>
        ${steps}
      </div>
      <div class="guide-section">
        <div class="guide-section-title">注意事項</div>
        ${tips}
      </div>`;
  }
  document.getElementById('guide-overlay').classList.add('show');
}
function closeGuide(){ document.getElementById('guide-overlay').classList.remove('show'); }
function openNote(){
  document.getElementById('note-ta').value = getLog().dayNote||'';
  document.getElementById('note-overlay').classList.add('show');
  setTimeout(()=>document.getElementById('note-ta').focus(),100);
}
function closeNote(){ document.getElementById('note-overlay').classList.remove('show'); }
function saveNote(){
  getLog().dayNote = document.getElementById('note-ta').value;
  persist(); closeNote(); renderToday();
}

// ── SCHEDULE ──
function renderSchedule(){
  const day = SCHEDULE[schedIdx];
  let tabs = SCHEDULE.map((d,i)=>`<button class="tab-btn${i===schedIdx?' on':''}" onclick="switchSched(${i})">${["一","二","三","四","五","六","日"][i]}</button>`).join('');
  let exRows = day.exercises.length===0
    ? `<div class="rest-card"><div class="rest-emoji">🧘</div><div class="rest-text">休息日</div></div>`
    : day.exercises.map((ex,i)=>{
      const log = getLog();
      const done = log.exercises[i]?.done;
      return `
      <div class="ex-row${done?' done':''}">
        <div class="ex-check${done?' checked':''}" onclick="toggleEx(${i});renderSchedule()"><span class="check-mark">✓</span></div>
        <div style="flex:1" onclick="toggleEx(${i});renderSchedule()">
          <div class="ex-name">${ex.name}</div>
          <div class="ex-detail">${ex.sets}組 × ${ex.reps}</div>
        </div>
        <button class="info-btn" onclick="openGuide('${ex.name.replace(/'/g,"\\'")}')">📖</button>
        <div class="ex-weight" onclick="toggleEx(${i});renderSchedule()">${ex.weight}</div>
      </div>`;
    }).join('');

  // Cooldown
  let cooldownRows = '';
  if(day.cooldown && day.cooldown.length>0){
    cooldownRows = `<div class="card" style="margin-top:0">
      <div style="padding:12px 16px;border-bottom:1px solid var(--bd);font-size:14px;font-weight:700;color:var(--acc2)">🧘 收操放鬆</div>
      ${day.cooldown.map((c,i)=>`
        <div style="display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:${i<day.cooldown.length-1?'1px solid var(--bd)':'none'}">
          <span style="font-size:18px;flex-shrink:0">🔵</span>
          <div style="flex:1">
            <div style="font-size:14px;font-weight:600;color:var(--txt)">${c.name}</div>
            <div style="font-size:12px;color:var(--mut);margin-top:2px">${c.note}</div>
          </div>
          <div style="font-size:12px;color:var(--acc2);font-weight:600;flex-shrink:0;text-align:right">${c.duration}</div>
        </div>`).join('')}
    </div>`;
  }

  document.getElementById('pg-schedule').innerHTML = `
  <div class="topbar"><div class="topbar-title">課表總覽</div></div>
  <div class="tab-row">${tabs}</div>
  <div class="card">
    <div class="sched-title">${day.title}</div>
    ${exRows}
  </div>
  ${cooldownRows}`;
}
function switchSched(i){ schedIdx=i; renderSchedule(); }

// ── STATS ──
function renderStats(){
  try{
    const todStr = todayStr();
    const now = new Date(); const dw = now.getDay();
    const mon = new Date(now); mon.setDate(now.getDate()-(dw===0?6:dw-1));
    const week = Array.from({length:7},(_,i)=>{const d=new Date(mon);d.setDate(mon.getDate()+i);return d.toISOString().slice(0,10);});

    let streak=0;
    const sortedKeys = Object.keys(logs).sort().reverse();
    for(const k of sortedKeys){
      const exObj = logs[k]?.exercises||{};
      if(Object.values(exObj).some(e=>e&&e.done)) streak++;
      else break;
    }
    const weekDone = week.filter(d=>{
      const exObj = logs[d]?.exercises||{};
      return Object.values(exObj).some(e=>e&&e.done);
    }).length;
    const totalEx = Object.values(logs).reduce((s,l)=>{
      return s + Object.values(l.exercises||{}).filter(e=>e&&e.done).length;
    },0);

    const dots = week.map((d,i)=>{
      const done = Object.values(logs[d]?.exercises||{}).some(e=>e&&e.done);
      const isToday = d===todStr;
      const num = parseInt(d.slice(8));
      let cls = 'wd-dot'; if(done) cls+=' done'; else if(isToday) cls+=' today';
      return `<div class="week-day"><div class="wd-lbl">${DAYS_LABEL[i]}</div><div class="${cls}">${num}</div></div>`;
    }).join('');

    const histItems = Object.entries(logs)
      .sort((a,b)=>b[0].localeCompare(a[0]))
      .slice(0,20)
      .map(([d,lg])=>{
        const exDone = Object.values(lg.exercises||{}).filter(e=>e&&e.done).length;
        if(exDone===0 && !lg.dayNote) return '';
        const dt = new Date(d);
        return `<div class="card" style="margin-top:0">
          <div class="hist-row">
            <span style="font-size:14px;font-weight:600">${dt.getMonth()+1}/${dt.getDate()}</span>
            <span style="font-size:12px;color:${exDone>0?'var(--grn)':'var(--mut)'}">${exDone>0?`✓ ${exDone} 個動作`:'未記錄'}</span>
          </div>
          ${lg.dayNote?`<div class="hist-note">${lg.dayNote}</div>`:''}
        </div>`;
      }).join('');

    document.getElementById('pg-stats').innerHTML = `
    <div class="topbar"><div class="topbar-title">訓練紀錄</div></div>
    <div class="stat-row">
      <div class="stat-box"><div class="stat-num">${streak}</div><div class="stat-lbl">連續天數 🔥</div></div>
      <div class="stat-box"><div class="stat-num">${weekDone}</div><div class="stat-lbl">本週完成天</div></div>
      <div class="stat-box"><div class="stat-num">${totalEx}</div><div class="stat-lbl">累計動作</div></div>
    </div>
    <div class="card"><div class="week-grid">${dots}</div></div>
    <div class="sec-lbl">歷史紀錄</div>
    ${histItems||`<div style="padding:24px;text-align:center;color:var(--mut);font-size:13px;line-height:1.6">還沒有紀錄<br>開始訓練並打勾完成動作吧！</div>`}
    <div style="height:20px"></div>`;
  }catch(e){
    document.getElementById('pg-stats').innerHTML = `
    <div class="topbar"><div class="topbar-title">訓練紀錄</div></div>
    <div style="padding:24px;color:var(--mut);font-size:13px;word-break:break-all">錯誤：${e.message}<br><br>${e.stack||''}</div>`;
  }
}

    {icon:"🥗",title:"飲食建議",desc:"每日蛋白質 ≥ 140g（體重 × 1.6g）。熱量維持微赤字 200–300 kcal，達到增肌減脂效果。"},
    {icon:"😴",title:"恢復與睡眠",desc:"每晚睡眠 7–9 小時。週三活動度訓練不可省略，有助於減少傷害風險。"},

// ── INIT ──
load();
renderToday();
renderSchedule();
renderStats();
renderInfo();
</script>
